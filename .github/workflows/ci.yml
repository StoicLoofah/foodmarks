name: CI

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          pip install -r requirements.txt
          pip install -r requirements-dev.txt

      - name: Write CI settings
        run: |
          cat > foodmarks/settings_local.py << 'EOF'
          DATABASES = {
              'default': {
                  'ENGINE': 'django.db.backends.sqlite3',
                  'NAME': ':memory:',
              }
          }
          EOF

      - name: Lint with ruff
        run: ruff check foodmarks/

      - name: Check formatting with ruff
        run: ruff format --check foodmarks/

      - name: Run tests
        run: cd foodmarks && python manage.py test
